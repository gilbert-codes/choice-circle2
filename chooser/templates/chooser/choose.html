<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Start Spin - Choice Circle</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 720px; margin: 0 auto; padding: 32px; }
        .panel { background: #111827; border-radius: 20px; padding: 32px; box-shadow: 0 18px 40px rgba(0,0,0,.35); }
        h1 { color: #38bdf8; }
        .button { background: #f97316; color: #fff; border: none; border-radius: 12px; padding: 16px 24px; font-size: 1rem; cursor: pointer; transition: transform .2s ease; }
        .button:hover { background: #ea580c; transform: translateY(-1px); }
        .hint { margin-top: 18px; color: #94a3b8; }
        .spinner-card { width: 260px; height: 260px; margin: 24px auto 18px; position: relative; }
        .spinner-wheel {
            width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#f97316 0 25%, #38bdf8 25% 50%, #f59e0b 50% 75%, #a855f7 75% 100%);
            box-shadow: 0 0 0 12px rgba(255,255,255,.08), inset 0 0 30px rgba(0,0,0,.25);
            transition: transform 1.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .spinner-pointer {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -100%); color: #f8fafc; font-size: 2.8rem; text-shadow: 0 0 8px rgba(0,0,0,.5);
        }
        .spinning .spinner-wheel { transform: rotate(1080deg); }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <h1>Hello {{ participant.name }}</h1>
        <p class="hint">Press the spin button to reveal your selected circle member. You cannot choose yourself, and each person can only be chosen once.</p>
        <p class="hint">Remaining possible choices: {{ remaining_targets }}</p>
        <div class="spinner-card" id="spinnerCard">
            <div class="spinner-wheel"></div>
            <div class="spinner-pointer">▼</div>
        </div>
        <form method="post" id="spinForm">
            {% csrf_token %}
            <button type="submit" class="button" id="spinButton">Spin & Reveal</button>
        </form>
        <p class="hint"><a style="color: #60a5fa;" href="{% url 'home' %}">Back to name selection</a></p>
    </div>
    <script>
        const form = document.getElementById('spinForm');
        const button = document.getElementById('spinButton');
        const spinner = document.getElementById('spinnerCard');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            button.disabled = true;
            button.textContent = 'Spinning...';
            spinner.classList.add('spinning');
            setTimeout(function() {
                form.submit();
            }, 1800);
        });
    </script>
</div>
</body>
</html>
